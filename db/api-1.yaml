openapi: 3.1.0
info:
  title: CCTNS-V2 Data Relay API
  description: These API's are designed for accessing data from CCTNS-v2
  version: 1.0.0
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
security:
  - ApiKeyAuth: []
paths:
  /api/{client}/ping:
    get:
      operationId: getApi:clientPing
      description: Endpoint to test api
      tags:
        - Ping
      responses:
        "200":
          description: Successful response
        "400":
          description: Error Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  status:
                    const: false
                required:
                  - message
                  - status
      parameters:
        - in: path
          name: client
          schema:
            enum:
              - ADMIN
              - CAT
              - CITIZEN_PORTAL
              - DOPAMS
              - ECOPS_MOBILE
              - E_CHALLAN
              - FINGER_PRINT_BUREAU
          required: true
  /api/{client}/crimes/disposal:
    get:
      operationId: getApi:clientCrimesDisposal
      description: Endpoint to get disposal cases data between provided time period
      tags:
        - Crimes
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        CASE_STATUS:
                          type: string
                        CRIME_ID:
                          type: string
                        DISPOSAL:
                          type: string
                        DISPOSAL_TYPE:
                          type: string
                        DISPOSED_DATE:
                          type: string
                      required:
                        - CASE_STATUS
                        - CRIME_ID
                        - DISPOSAL
                        - DISPOSAL_TYPE
                        - DISPOSED_DATE
                  status:
                    const: true
                required:
                  - data
                  - status
        "400":
          description: Error Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  status:
                    const: false
                required:
                  - message
                  - status
      parameters:
        - in: query
          name: fromDate
          schema:
            type: string
          required: true
          description: YYYY-MM-DD
        - in: query
          name: toDate
          schema:
            type: string
          required: true
          description: YYYY-MM-DD
        - in: path
          name: client
          schema:
            enum:
              - ADMIN
              - CAT
              - CITIZEN_PORTAL
              - DOPAMS
              - ECOPS_MOBILE
              - E_CHALLAN
              - FINGER_PRINT_BUREAU
          required: true
  /api/{client}/crimes/disposal/{crimeId}:
    get:
      operationId: getApi:clientCrimesDisposal:crimeId
      description: Endpoint to get disposal case data using crimeId
      tags:
        - Crimes
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      CASE_STATUS:
                        type: string
                      CRIME_ID:
                        type: string
                      DISPOSAL:
                        type: string
                      DISPOSAL_TYPE:
                        type: string
                      DISPOSED_DATE:
                        type: string
                    required:
                      - CASE_STATUS
                      - CRIME_ID
                      - DISPOSAL
                      - DISPOSAL_TYPE
                      - DISPOSED_DATE
                  status:
                    const: true
                required:
                  - data
                  - status
        "400":
          description: Error Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  status:
                    const: false
                required:
                  - message
                  - status
      parameters:
        - in: path
          name: client
          schema:
            enum:
              - ADMIN
              - CAT
              - CITIZEN_PORTAL
              - DOPAMS
              - ECOPS_MOBILE
              - E_CHALLAN
              - FINGER_PRINT_BUREAU
          required: true
        - in: path
          name: crimeId
          schema:
            type: string
            pattern: ^[\dA-Fa-f]+$
            minLength: 24
            maxLength: 24
          required: true
  /api/{client}/crimes:
    get:
      operationId: getApi:clientCrimes
      description: Endpoint to get crimes data updated between provided time period
      tags:
        - Crimes
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        ACTS_SECTIONS:
                          type: string
                        BRIEF_FACTS:
                          type: string
                        CASE_STATUS:
                          type: string
                        COMPLAINANT_ID:
                          type: string
                          description: COMPLAINANT ID
                        COURT_NAME:
                          type: string
                        CRIME_ID:
                          type: string
                          description: PRIMARY KEY
                        CRIME_TYPE:
                          type: string
                        DATE_CREATED:
                          type: string
                        DATE_MODIFIED:
                          type: string
                        FIR_COPY:
                          type: string
                        FIR_DATE:
                          type: string
                        FIR_NUM:
                          type: string
                        FIR_REG_NUM:
                          type: string
                        FIR_TYPE:
                          type: string
                        GD:
                          type: object
                          properties:
                            ENTRY_DATE:
                              type: string
                            ENTRY_NUM:
                              type: string
                            ENTRY_TYPE:
                              type: string
                          required:
                            - ENTRY_DATE
                            - ENTRY_NUM
                            - ENTRY_TYPE
                        IO_MOBILE:
                          type: string
                        IO_NAME:
                          type: string
                        IO_RANK:
                          type: string
                        MAJOR_HEAD:
                          type: string
                        MINOR_HEAD:
                          type: string
                        OCCURRENCE_DATE:
                          type: object
                          properties:
                            FROM_DATE:
                              type: string
                            PRIOR_TO_DATE:
                              type: string
                            TO_DATE:
                              type: string
                          required:
                            - FROM_DATE
                            - PRIOR_TO_DATE
                            - TO_DATE
                        PLACE_OF_OFFENCE:
                          type: object
                          properties:
                            AREA_MANDAL:
                              type: string
                            BEAT_NO:
                              type: string
                            DISTRICT:
                              type: string
                            HOUSE_NO:
                              type: string
                            JURISDICTION_PS:
                              type: string
                            LANDMARK_MILESTONE:
                              type: string
                            LATITUDE:
                              type: string
                            LIMITS:
                              type: string
                            LONGITUDE:
                              type: string
                            PIN_CODE:
                              type: string
                            STATE_UT:
                              type: string
                            STREET_ROAD_NO:
                              type: string
                            WARD_COLONY:
                              type: string
                          required:
                            - AREA_MANDAL
                            - BEAT_NO
                            - DISTRICT
                            - HOUSE_NO
                            - JURISDICTION_PS
                            - LANDMARK_MILESTONE
                            - LATITUDE
                            - LIMITS
                            - LONGITUDE
                            - PIN_CODE
                            - STATE_UT
                            - STREET_ROAD_NO
                            - WARD_COLONY
                        PS_CODE:
                          type: string
                      required:
                        - ACTS_SECTIONS
                        - BRIEF_FACTS
                        - CASE_STATUS
                        - COMPLAINANT_ID
                        - COURT_NAME
                        - CRIME_ID
                        - CRIME_TYPE
                        - DATE_CREATED
                        - DATE_MODIFIED
                        - FIR_COPY
                        - FIR_DATE
                        - FIR_NUM
                        - FIR_REG_NUM
                        - FIR_TYPE
                        - GD
                        - IO_MOBILE
                        - IO_NAME
                        - IO_RANK
                        - MAJOR_HEAD
                        - MINOR_HEAD
                        - OCCURRENCE_DATE
                        - PLACE_OF_OFFENCE
                        - PS_CODE
                  status:
                    const: true
                required:
                  - data
                  - status
        "400":
          description: Error Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  status:
                    const: false
                required:
                  - message
                  - status
      parameters:
        - in: query
          name: fromDate
          schema:
            type: string
          required: true
          description: YYYY-MM-DD
        - in: query
          name: toDate
          schema:
            type: string
          required: true
          description: YYYY-MM-DD
        - in: path
