# Local MinIO for SSOR document storage.
#   docker compose -f docker-compose.minio.yml up -d
#
# Console:  http://localhost:9001  (login: minioadmin / minioadmin)
# S3 API:   http://localhost:9000  (used by the backend)
#
# Change the credentials here and in backend/.env before any non-local use.
services:
  minio:
    image: minio/minio:latest
    container_name: ssor-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3

volumes:
  minio_data:
